# Development override — mounts source for hot reload
version: "3.9"

services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
      target: builder
    volumes:
      - ../../apps/api/src:/app/apps/api/src
      - ../../packages:/app/packages
    command: ["pnpm", "--filter", "@lighter-bot/api", "dev"]
    environment:
      NODE_ENV: development
      LOG_PRETTY: "true"
      LOG_LEVEL: debug

  dashboard:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.dashboard
      target: builder
    volumes:
      - ../../apps/dashboard/src:/app/apps/dashboard/src
    command: ["pnpm", "--filter", "@lighter-bot/dashboard", "dev"]
    environment:
      NODE_ENV: development
