version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lighter_bot
      POSTGRES_PASSWORD: lighter_bot_pass
      POSTGRES_DB: lighter_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lighter_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── API Backend ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://lighter_bot:lighter_bot_pass@postgres:5432/lighter_bot
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      API_PORT: "3001"
      API_HOST: "0.0.0.0"
      CORS_ORIGINS: "http://localhost:3000,http://dashboard:3000"
      LOG_LEVEL: info
      LOG_PRETTY: "false"
      # ── SAFETY: All three must be set to enable live trading ──────────────────
      # DRY_RUN defaults to true — override below ONLY after reading the docs
      DRY_RUN: "true"
      PAPER_TRADING: "true"
      ENABLE_LIVE_TRADING: "false"
      I_UNDERSTAND_THIS_MAY_LOSE_REAL_MONEY: "false"
      # OPERATOR_CONFIRMATION_TOKEN: ""  # Must be set for live
      # ── Lighter API ───────────────────────────────────────────────────────────
      LIGHTER_API_URL: ${LIGHTER_API_URL:-https://mainnet.zklighter.elliot.ai}
      LIGHTER_WS_URL: ${LIGHTER_WS_URL:-wss://mainnet.zklighter.elliot.ai/stream}
      LIGHTER_API_KEY: ${LIGHTER_API_KEY:-}
      LIGHTER_SUB_ACCOUNT_ID: ${LIGHTER_SUB_ACCOUNT_ID:-}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Dashboard ────────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dashboard
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001/ws
    ports:
      - "3000:3000"

volumes:
  postgres_data:

networks:
  default:
    name: lighter_bot_network
