[build]
builder = "nixpacks"
buildCommand = "cd ../.. && pnpm install && pnpm --filter @lighter-bot/common build && pnpm --filter @lighter-bot/strategy build && pnpm --filter @lighter-bot/risk build && pnpm --filter @lighter-bot/execution build && pnpm --filter @lighter-bot/backtest build && pnpm --filter @lighter-bot/api build && pnpm --filter @lighter-bot/api db:generate"

[deploy]
startCommand = "node apps/api/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "lighter-bot-api"
