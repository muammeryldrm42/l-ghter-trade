[build]
builder = "nixpacks"

[deploy]
# db push creates tables if they don't exist (no migration history needed)
startCommand = "npx prisma db push --schema=apps/api/prisma/schema.prisma --accept-data-loss && node apps/api/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
